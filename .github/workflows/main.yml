name: Deploy PROJECT M on push

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    - name: Inject Secrets
      run: |
        cat << 'EOF' > includes/secrets.php
        <?php
        define('DB_HOST', '${{ secrets.DB_HOST }}');
        define('DB_NAME', '${{ secrets.DB_NAME }}');
        define('DB_USER', '${{ secrets.DB_USER }}');
        define('DB_PASS', '${{ secrets.DB_PASS }}');
        define('APP_SECRET_VAL', '${{ secrets.APP_SECRET }}');
        ?>
        EOF

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./moneymgmt.is-best.net/htdocs/
        local-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/.github/**
          readme.md
          *.sql
