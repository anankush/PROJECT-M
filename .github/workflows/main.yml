name: Deploy Money Management on push

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    - name: Download latest disposable email list
      run: curl -s "https://raw.githubusercontent.com/disposable-email-domains/disposable-email-domains/master/disposable_email_blocklist.conf" -o includes/disposable_domains.txt

    - name: Inject Secrets
      run: |
        cat << 'ENDOFFILE' > includes/secrets.php
        <?php
        // Auto-generated by GitHub Actions — DO NOT EDIT
        // Secrets injected from GitHub repository settings.
        define('DB_HOST', '${{ secrets.DB_HOST }}');
        define('DB_NAME', '${{ secrets.DB_NAME }}');
        define('DB_USER', '${{ secrets.DB_USER }}');
        define('DB_PASS', '${{ secrets.DB_PASS }}');
        define('APP_SECRET_VAL', '${{ secrets.APP_SECRET }}');
        define('GOOGLE_SCRIPT_URL', '${{ secrets.GOOGLE_SCRIPT_URL }}');
        define('AI_API_KEY', '${{ secrets.AI_API_KEY }}');
        define('AI_API_KEY_1', '${{ secrets.AI_API_KEY_1 }}');
        define('AI_API_KEY_2', '${{ secrets.AI_API_KEY_2 }}');
        define('AI_API_KEY_3', '${{ secrets.AI_API_KEY_3 }}');
        define('AI_API_KEY_4', '${{ secrets.AI_API_KEY_4 }}');
        define('SESSION_LIFETIME', 900);
        define('BASE_URL', '/');
        ?>
        ENDOFFILE

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./moneymgmt.is-best.net/htdocs/
        local-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/.github/**
          **/includes/env.php
          **/includes/env.example.php
          readme.md
          *.sql
